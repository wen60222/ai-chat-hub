<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Hub - AI模型聚合平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">AI</div>
      </div>
      <h1>AI Chat Hub</h1>
      <p class="login-subtitle">多模型AI对话平台 · 一站式智能工具</p>
      
      <div id="login-error" class="error-message"></div>

      <div id="login-form">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="login-email" placeholder="请输入邮箱" autocomplete="email">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="btn-primary" onclick="auth.login()">登录</button>
        <div class="form-footer">
          还没有账号？<a onclick="auth.showRegister()">注册</a>
        </div>
      </div>

      <div id="register-form" class="hidden">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="reg-username" placeholder="给自己起个名字">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="reg-email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="reg-password" placeholder="至少6位密码">
        </div>
        <button class="btn-primary" onclick="auth.register()">注册</button>
        <div class="form-footer">
          已有账号？<a onclick="auth.showLogin()">登录</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app-layout hidden">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">AI</div>
        <span class="brand-text">Chat Hub</span>
      </div>

      <div class="sidebar-nav" id="sidebar-nav">
        <!-- Dynamically rendered -->
      </div>

      <div class="sidebar-footer">
        <div class="user-card" id="user-card">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">用户</div>
            <div class="user-plan" id="sidebar-plan">免费版</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="main-content">
      <div class="top-header">
        <div class="header-left">
          <button class="header-btn" onclick="app.toggleSidebar()" style="display:none;" id="sidebar-toggle">
            <i class="fas fa-bars"></i>
          </button>
          <span class="header-title" id="page-title">首页</span>
        </div>
        <div class="header-right">
          <button class="header-btn" id="admin-header-btn" style="display:none;" onclick="router.go('admin')">
            <i class="fas fa-cog"></i> 管理
          </button>
          <button class="header-btn" onclick="auth.logout()">
            <i class="fas fa-sign-out-alt"></i> 退出
          </button>
        </div>
      </div>

      <div class="page-container" id="page-content">
        <!-- Pages rendered here -->
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (token) {
      auth.token = token;
      auth.loadProfile().then(() => {
        app.init();
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }).catch(() => {
        localStorage.removeItem('token');
      });
    }
  </script>
</body>
</html>
